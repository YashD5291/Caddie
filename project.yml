name: Caddie
options:
  bundleIdPrefix: com.caddie
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    DEVELOPMENT_TEAM: WBUPX3432S
    PRODUCT_BUNDLE_IDENTIFIER: com.caddie.app
    MARKETING_VERSION: "1.2.1"
    CURRENT_PROJECT_VERSION: "4"
    INFOPLIST_FILE: Resources/Info.plist
    ENABLE_HARDENED_RUNTIME: YES
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: Resources/CaddieDebug.entitlements
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
      OTHER_CODE_SIGN_FLAGS: ""
      # The entitlements file carries an immovable `com.apple.provenance` xattr that
      # Xcode's ProcessProductPackaging step perceives as an in-build modification.
      # Allow it for Debug only; Release keeps strict packaging for notarized builds.
      CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    Release:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_ENTITLEMENTS: Resources/Caddie.entitlements
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  SimplyCoreAudio:
    url: https://github.com/rnine/SimplyCoreAudio
    from: "4.0.0"
  AXSwift:
    url: https://github.com/tmandry/AXSwift
    from: "0.3.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.4"

targets:
  Caddie:
    type: application
    platform: macOS
    preBuildScripts:
      - name: Download ML Models
        script: "${SRCROOT}/scripts/download-models.sh"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Copy ML Models to Bundle
        script: |
          MODELS_SRC="${SRCROOT}/Resources/Models"
          MODELS_DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Models"
          if [ -d "$MODELS_SRC" ]; then
            mkdir -p "$MODELS_DST"
            rsync -a --delete "$MODELS_SRC/" "$MODELS_DST/"
            echo "Copied ML models to bundle"
          else
            echo "warning: Models directory not found at $MODELS_SRC"
          fi
        basedOnDependencyAnalysis: false
    sources:
      - Sources
      - path: Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - "Assets.xcassets"
          - "Models/**/*.mlpackage"
          - "*.entitlements"
    dependencies:
      - package: GRDB
      - package: SimplyCoreAudio
      - package: AXSwift
      - package: Sparkle
      - package: FluidAudio
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: false

  CaddieTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Caddie
      - package: GRDB
    settings:
      base:
        CLANG_ENABLE_CODE_COVERAGE: NO

schemes:
  Caddie:
    build:
      targets:
        Caddie: all
    run:
      config: Debug
    test:
      gatherCoverageData: false
      targets:
        - CaddieTests
