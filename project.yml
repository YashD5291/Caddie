name: Caddie
options:
  bundleIdPrefix: com.caddie
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.caddie.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/Caddie.entitlements
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  SimplyCoreAudio:
    url: https://github.com/rnine/SimplyCoreAudio
    from: "4.0.0"
  AXSwift:
    url: https://github.com/tmandry/AXSwift
    from: "0.3.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.4"

targets:
  Caddie:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - "Assets.xcassets"
    dependencies:
      - package: GRDB
      - package: SimplyCoreAudio
      - package: AXSwift
      - package: Sparkle
      - package: FluidAudio
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: true

  CaddieTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Caddie
      - package: GRDB
    settings:
      base:
        CLANG_ENABLE_CODE_COVERAGE: NO

schemes:
  Caddie:
    build:
      targets:
        Caddie: all
    run:
      config: Debug
    test:
      gatherCoverageData: false
      targets:
        - CaddieTests
