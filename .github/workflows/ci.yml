name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache ML Models
        uses: actions/cache@v4
        with:
          path: Resources/Models
          key: ml-models-parakeet-v3-sortformer-v2
          restore-keys: |
            ml-models-

      - name: Build
        run: |
          xcodebuild build \
            -project Caddie.xcodeproj \
            -scheme Caddie \
            -configuration Debug \
            -destination 'platform=macOS' \
            | xcbeautify || true

      - name: Test
        run: |
          xcodebuild test \
            -project Caddie.xcodeproj \
            -scheme Caddie \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            | xcbeautify || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
